# Agenda Application Generator Prompt

**Style Guide**: This document follows the style guidelines defined in `Map.md`. Refer to that document for complete symbolic language definitions, AI model configurations, and architectural patterns.

Create a very small, lightweight, and fast application GUI that generates intelligent agendas from the buildlog.txt file metadata. The application should:

## Core Requirements
- **Lightweight**: Minimal dependencies, fast startup, low memory usage
- **Project-specific**: Only work with the current project's buildlog.txt
- **Intelligent parsing**: Use algorithms to determine user needs from buildlog metadata
- **Multi-agenda support**: Handle different types of agendas dynamically

## Agenda Types & Intelligence

### Todo List Generation
- **Algorithm**: Analyze "Next Steps", "In Progress Features", and "Known Bugs"
- **Priority calculation**: Use symbol indicators from Map.md and progress percentages
- **Dependency mapping**: Identify blocking tasks and prerequisites
- **Effort estimation**: Infer complexity from descriptions and progress
- **Smart ordering**: Sort by priority, dependencies, and estimated effort

### Calendar Integration
- **Date extraction**: Parse ETAs, target dates, and timestamps from buildlog
- **Milestone mapping**: Convert implementation goals to calendar events
- **Deadline tracking**: Highlight approaching deadlines and overdue items
- **Time allocation**: Suggest time blocks based on task complexity
- **Conflict detection**: Identify overlapping deadlines and resource conflicts

### Changelog Generation
- **Version tracking**: Monitor "Current Version" section changes
- **Feature completion**: Track items moving from "In Progress" to "Done"
- **Bug resolution**: Monitor bug status changes and resolutions
- **Build history**: Parse "Build Summary" for deployment tracking
- **Auto-formatting**: Generate markdown changelog with proper categorization

### Journal Creation
- **Notes extraction**: Process "Notes & Observations" section
- **Progress logging**: Track daily/weekly progress automatically
- **Decision documentation**: Capture architectural and design decisions
- **Challenge tracking**: Monitor recurring issues and solutions
- **Insight generation**: Identify patterns and lessons learned

### Grocery List Abstraction
- **Resource mapping**: Convert technical dependencies to resource needs
- **Supply tracking**: Monitor build tools, dependencies, and requirements
- **Inventory management**: Track what's available vs. what's needed
- **Procurement planning**: Suggest when to acquire new resources
- **Cost estimation**: Infer resource costs from project complexity

## Intelligent Algorithms

### Context Analysis
- **Project phase detection**: Determine if project is in planning, development, testing, or deployment
- **Resource assessment**: Analyze team size, tools, and dependencies
- **Risk evaluation**: Identify potential blockers and mitigation strategies
- **Progress prediction**: Estimate completion dates based on current velocity

### Priority Optimization
- **Critical path analysis**: Identify tasks that block other progress
- **Resource allocation**: Suggest optimal task ordering for available resources
- **Dependency resolution**: Automatically suggest next actions based on completed prerequisites
- **Effort balancing**: Distribute work evenly across available time

### Adaptive Suggestions
- **Learning from patterns**: Remember user preferences and common workflows
- **Contextual recommendations**: Suggest actions based on current project state
- **Proactive alerts**: Warn about potential issues before they become blockers
- **Efficiency tips**: Suggest ways to optimize workflow based on buildlog data

## Technical Specifications
- **Language**: Choose the most lightweight option for the target platform
- **GUI Framework**: Use native or minimal frameworks
- **File parsing**: Fast markdown parsing with metadata extraction
- **Real-time updates**: Monitor buildlog.txt changes and refresh agendas
- **Data persistence**: Save user preferences and custom agenda configurations

## User Experience
- **Tabbed interface**: Separate tabs for each agenda type
- **Smart defaults**: Automatically populate agendas based on buildlog analysis
- **Customization**: Allow users to modify generated agendas
- **Export options**: Save agendas in various formats (markdown, CSV, calendar)
- **Search/filter**: Quick access to specific agenda items

## Integration Requirements
- **Buildlog sync**: Keep agendas synchronized with buildlog.txt changes
- **Bidirectional updates**: Changes in agendas can update buildlog.txt
- **Conflict resolution**: Handle simultaneous edits gracefully
- **Backup system**: Preserve agenda data and user preferences

## Performance Requirements
- **Startup time**: < 3 seconds
- **Memory usage**: < 150MB
- **Agenda generation**: < 500ms for typical buildlog sizes
- **UI responsiveness**: < 16ms frame time
- **File watching**: < 100ms response to buildlog changes

## Output
Generate a complete, runnable application that:
1. Reads and analyzes the current project's buildlog.txt
2. Uses intelligent algorithms to determine user needs
3. Generates appropriate agendas (todo, calendar, changelog, journal, grocery)
4. Provides a clean, intuitive interface for managing multiple agenda types
5. Maintains synchronization with buildlog.txt
6. Adapts to different project phases and requirements

The application should be self-contained, require minimal setup, and intelligently adapt its agenda generation based on the project's current state and metadata.
