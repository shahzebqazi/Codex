### Research Directive
1. **Investigate** the following question:  
   [State research question here]

2. **Develop** a testable hypothesis:  
   [Proposed hypothesis or "To be determined through initial research"]

3. **Construct** logical argument with:  
   - Minimum 5 peer-reviewed sources (prioritize recent, high-impact studies)  
   - Clear premises supporting the hypothesis  
   - Anticipated counterarguments  

4. **Deliver** structured conclusion:  
   - Summary judgment on hypothesis validity  
   - Addressing key refutations  
   - Recommended avenues for further research  

