# Kanban Application Generator Prompt

**Style Guide**: This document follows the style guidelines defined in `Map.md`. Refer to that document for complete symbolic language definitions, AI model configurations, and architectural patterns.

Create a very small, lightweight, and fast application GUI that generates a kanban board from the buildlog.txt file. The application should:

## Core Requirements
- **Lightweight**: Minimal dependencies, fast startup, low memory usage
- **Cross-platform**: Work on macOS, Windows, and Linux
- **Real-time updates**: Automatically refresh when buildlog.txt changes
- **Simple interface**: Clean, intuitive kanban board layout

## Functionality
- **Read buildlog.txt**: Parse the markdown file and extract actionable items
- **Create kanban columns**: 
  - ! Backlog (Implementation Goals, Planned Features)
  - @ In Progress (Active Development, Current Tasks)
  - # Testing (Features at 75-90% completion)
  - $ Done (Completed items, Resolved bugs)
  - % Blocked (Items with issues or dependencies)
  - !!! Urgent (Immediate action required)
  - @@ Review (In review/QA phase)
  - * Deployed (Released to production)
  - ** Transition (Moving between states)

## Data Mapping
- **Cards**: Each item from buildlog becomes a kanban card
- **Priority indicators**: Use emoji priority system (🔥⚡💡📌)
- **Progress tracking**: Show completion percentages visually
- **Timestamps**: Display last updated times
- **Status icons**: Use buildlog status indicators (🟢🔴🟡⏸️)

## Technical Specifications
- **Language**: Choose the most lightweight option for the target platform
- **GUI Framework**: Use native or minimal frameworks (Tkinter, Qt, or web-based)
- **File watching**: Monitor buildlog.txt for changes
- **Responsive design**: Adapt to different screen sizes
- **Keyboard shortcuts**: Quick navigation and editing

## User Experience
- **Drag & drop**: Move cards between columns
- **Quick edit**: Double-click to edit card content
- **Search/filter**: Find specific items quickly
- **Export**: Save kanban state or generate reports
- **Minimal UI**: Focus on content, not chrome

## Integration
- **Auto-sync**: Keep kanban in sync with buildlog.txt
- **Bidirectional updates**: Changes in kanban update buildlog.txt
- **Conflict resolution**: Handle simultaneous edits gracefully
- **Backup**: Preserve data integrity

## Performance Requirements
- **Startup time**: < 2 seconds
- **Memory usage**: < 100MB
- **File parsing**: < 100ms for typical buildlog sizes
- **UI responsiveness**: < 16ms frame time

## Output
Generate a complete, runnable application that:
1. Reads the current project's buildlog.txt
2. Creates a visual kanban board
3. Allows drag-and-drop task management
4. Syncs changes back to buildlog.txt
5. Provides a fast, intuitive interface

The application should be self-contained and require minimal setup to run in the current project directory.
